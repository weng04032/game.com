<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥃 瘋狂雪克杯！職場理智線大挑戰 💥</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f0ff;
            --neon-yellow: #ffe600;
            --neon-purple: #7928ca;
        }

        body {
            background-color: #0d0d11;
            color: #e2e8f0;
            font-family: 'PingFang TC', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(25, 25, 35, 0.9);
            backdrop-filter: blur(10px);
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.25);
            text-align: center;
            border: 1px solid rgba(255, 0, 127, 0.3);
            position: relative;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 8px #fff, 0 0 15px var(--neon-pink), 0 0 30px var(--neon-purple);
            font-size: 1.8rem;
            margin-bottom: 10px;
            animation: lightFlicker 4s infinite alternate;
        }

        @keyframes lightFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 8px #fff, 0 0 15px var(--neon-pink), 0 0 30px var(--neon-purple); }
            20%, 24%, 55% { text-shadow: none; color: #444; }
        }

        .hidden { display: none !important; }

        .game-zone {
            margin: 25px 0;
            position: relative;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shaker-svg-wrap {
            width: 160px;
            height: 160px;
            cursor: pointer;
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.6));
            animation: float 3s ease-in-out infinite;
            transition: transform 0.05s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        .crazy-shake {
            animation: hardShake 0.08s infinite alternate !important;
        }

        @keyframes hardShake {
            0% { transform: translate(6px, 4px) rotate(5deg) scale(1.08); }
            100% { transform: translate(-6px, -4px) rotate(-5deg) scale(1.08); }
        }

        .progress-container {
            background: #15151f;
            border-radius: 20px;
            padding: 4px;
            border: 1px solid rgba(0, 240, 255, 0.4);
            margin: 20px 0;
        }
        .progress-bar {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            height: 16px;
            width: 0%;
            border-radius: 10px;
            transition: width 0.08s ease;
            box-shadow: 0 0 12px var(--neon-pink);
        }

        .floating-word {
            position: absolute;
            color: var(--neon-yellow);
            font-weight: 900;
            font-size: 28px;
            text-shadow: 0 0 12px rgba(255,230,0,1), 0 0 4px rgba(0,0,0,0.8);
            pointer-events: none;
            white-space: nowrap;
            animation: flyUp 0.6s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
            z-index: 10;
        }

        @keyframes flyUp {
            0% { transform: translate(0, 0) scale(0.7); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.2); opacity: 0; }
        }

        .btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }
        .btn:active { transform: scale(0.97); }

        .timer {
            font-size: 3.2rem;
            color: var(--neon-pink);
            font-weight: bold;
            text-shadow: 0 0 12px var(--neon-pink);
            margin: 5px 0;
        }

        .checkbox-group { text-align: left; margin: 25px 0; }
        .box-item {
            background: rgba(255,255,255,0.04);
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }
        .box-item input { margin-right: 12px; transform: scale(1.2); accent-color: var(--neon-blue); }

        .result-box {
            background: rgba(15, 15, 20, 0.85);
            padding: 25px;
            border-radius: 16px;
            text-align: left;
            margin: 20px 0;
            border-left: 4px solid var(--neon-pink);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1>🥃 深夜心情酒館</h1>
        <p style="color: #94a3b8; font-size: 15px;">今晚要把哪種職場毒素給 Shake 掉？</p>
        <div class="checkbox-group">
            <label class="box-item"><input type="checkbox" checked> 主管無預警發問：「在嗎？」</label>
            <label class="box-item"><input type="checkbox" checked> 提案瘋狂改版，最後說還是第一版好</label>
            <label class="box-item"><input type="checkbox"> 同事精準甩鍋、伸手牌狂炸</label>
        </div>
        <button class="btn" onclick="goToGame()">進入吧檯開始調酒</button>
    </div>

    <div id="game-screen" class="hidden">
        <h1>💥 瘋狂注入怨氣值！</h1>
        <p style="color: #cbd5e1;">【點擊下方按鈕】或【直接暴擊雪克杯】</p>
        <div class="timer" id="countdown">5</div>
        
        <div class="game-zone" id="game-zone">
            <div id="shaker-wrapper" class="shaker-svg-wrap" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M40 15h20v6H40z" fill="#00f0ff" opacity="0.8"/>
                    <path d="M35 21h30l-3 12H38z" fill="#00f0ff"/>
                    <path d="M35 36h30l-7 45H42z" fill="none" stroke="#00f0ff" stroke-width="3" stroke-linejoin="round"/>
                    <path d="M40 50h20l-4 28H44z" fill="#ff007f" opacity="0.6"/>
                    <line x1="50" y1="36" x2="50" y2="81" stroke="#fff" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>
                </svg>
            </div>
        </div>

        <div class="progress-container">
            <div id="bar" class="progress-bar"></div>
        </div>
        <button class="btn" id="tap-btn" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">👉 瘋狂暴擊雪克杯 👈</button>
    </div>

    <div id="result-screen" class="hidden">
        <h1>🍹 今日專屬職涯特調</h1>
        <p id="click-count-report" style="color: var(--neon-blue); font-weight: bold; font-size: 16px;"></p>
        
        <div class="result-box">
            <h3 id="drink-name" style="color: var(--neon-yellow); margin-top: 0; font-size: 22px; text-shadow: 0 0 8px rgba(255,230,0,0.3);"></h3>
            <p id="drink-note" style="color: #cbd5e1; font-size: 15px; line-height: 1.6;"></p>
            <p id="drink-advice" style="color: #fff; font-weight: bold; font-size: 15px; line-height: 1.6; margin-bottom: 0;"></p>
        </div>
        
        <button class="btn" onclick="restartGame()">再乾一杯</button>
    </div>
</div>

<script>
    let clickCount = 0;
    let gameActive = false;
    let timeLeft = 5;
    let timerInterval;

    const words = ["干我屁事", "眼神死", "瘋狂改稿", "在嗎？", "無效會議", "伸手牌", "甩鍋預警", "我要特休", "謝囉逼機", "想躺平"];

    function goToGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        startGame();
    }

    function startGame() {
        clickCount = 0;
        timeLeft = 5;
        gameActive = true;
        document.getElementById('countdown').innerText = timeLeft;
        document.getElementById('bar').style.width = "0%";
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').innerText = timeLeft;
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function handleTap(event) {
        if (!gameActive) return;
        event.preventDefault();
        
        clickCount++;
        
        // 進度條長度比例隨最高期望門檻調整
        let progress = Math.min((clickCount / 22) * 100, 100);
        document.getElementById('bar').style.width = progress + "%";

        const shaker = document.getElementById('shaker-wrapper');
        shaker.classList.add('crazy-shake');
        
        clearTimeout(shaker.timeoutId);
        shaker.timeoutId = setTimeout(() => shaker.classList.remove('crazy-shake'), 80);

        createFloatingWord();
    }

    function createFloatingWord() {
        const zone = document.getElementById('game-zone');
        const word = document.createElement('div');
        word.classList.add('floating-word');
        word.innerText = words[Math.floor(Math.random() * words.length)];
        
        const randomX = (Math.random() - 0.5) * 260;
        const randomY = -(Math.random() * 100 + 90);
        word.style.setProperty('--x', `${randomX}px`);
        word.style.setProperty('--y', `${randomY}px`);

        word.style.left = `calc(50% - 50px)`;
        word.style.top = `60px`;

        zone.appendChild(word);
        setTimeout(() => word.remove(), 600);
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        document.getElementById('click-count-report').innerText = `🔥 5秒內你總共暴擊了 ${clickCount} 下！`;

        let name = "";
        let note = "";
        let advice = "";

        // 💥 這裡已精準修改為你指定的區間門檻 💥
        if (clickCount <= 15) {
            // 點擊次數在 15 下以內（含 7-15 下，或完全不點）
            name = "🍶 降火氣梅酒威士忌";
            note = "📝 風味筆記：酸甜平衡，夾帶微苦。看來你今天遇到的只是小風小浪，理智線尚有餘額。威士忌的沉穩壓住了怒火，梅酒的酸甜則讓你還能對著世界的荒謬微微一笑。";
            advice = "💡 今晚生存指南：你的職場防禦力還夠用。今晚宜：喝杯熱茶，點開人力銀行『看看但不投履歷』，維持心靈健康。";
        } else if (clickCount >= 16 && clickCount <= 20) {
            // 點擊次數在 16 - 20 下之間
            name = "🍸 驚驚長島冰茶";
            note = "📝 風味筆記：基底是 50% 的突發性心悸與 50% 的無效溝通。入口滿是「我是不是又做錯什麼」的職場焦慮酸澀感，後勁則帶有「大不了開除我」的烈酒本色。";
            advice = "💡 今晚生存指南：今晚把所有工作群組一律開啟靜音。看到任何 tag 請催眠自己：『這部分可能要麻煩未來的我確認喔～』然後強迫自己提早半小時躺平。";
        } else {
            // 點擊次數在 21 下以上
            name = "🍺 黃仁勳最愛：AI 級 1 兆產值啤酒";
            note = "📝 風味筆記：怨氣高達 1 兆美金！雪克杯差點被你單身三十年的暴擊手速搖到當場核爆。充滿了狂暴的「老娘明天不幹了」霸氣，氣泡感極強，喝下去瞬間智商超越 AI，看看破紅塵。";
            advice = "💡 今晚生存指南：你的理智線已徹底格式化。下班後的主管訊息一律視為冥婚紅包，看都不要看！今晚特許怒吃炸雞把熱量補回來，稿子可以白做，胃袋絕對不能空著！";
        }

        document.getElementById('drink-name').innerText = name;
        document.getElementById('drink-note').innerText = note;
        document.getElementById('drink-advice').innerText = advice;
    }

    function restartGame() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
    }
</script>
</body>
</html>
